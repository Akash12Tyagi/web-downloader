services:
  backend:
    build:
      context: ./backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000
      MAX_CONCURRENT_DOWNLOADS: 3
    volumes:
      - backend_tmp:/app/tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_tmp:
